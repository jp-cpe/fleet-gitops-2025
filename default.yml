# default.yml controls global settings and policies/reports that run on all hosts.

policies:
reports:
  - paths: ./platforms/all/reports/*.yml
agent_options:
controls:
labels:
  - paths: ./labels/*.yml
org_settings:
  server_settings:
    server_url: $FLEET_URL
  org_info:
    org_name: Fleet
  secrets:
    - secret: "$FLEET_GLOBAL_ENROLL_SECRET"
