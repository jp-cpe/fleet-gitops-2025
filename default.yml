# default.yml controls global settings and queries that run on all hosts.

policies:
queries:
  # fleetctl 4.82 expects `- path:` for file includes; `paths:` globs are a 4.83+ feature.
  - path: ./platforms/all/queries/axios-attack-detection.yml
agent_options:
controls:
org_settings:
  server_settings:
    server_url: $FLEET_URL
  org_info:
    org_name: Fleet
  secrets:
    - secret: "$FLEET_GLOBAL_ENROLL_SECRET"
